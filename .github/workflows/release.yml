name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 12)'
        required: true
        default: '1'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get short commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build binary via Docker
        run: ./build.sh

      - name: Fix permissions for build artifacts
        run: sudo chown -R $USER:$USER build

      - name: Rename binary with version and short SHA
        run: |
          VERSION="${{ github.event.inputs.version }}"
          SHA="${{ steps.vars.outputs.sha_short }}"
          mv build/kexp.bin build/kexp-v${VERSION}-${SHA}.bin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}-${{ steps.vars.outputs.sha_short }}
          name: Release v${{ github.event.inputs.version }}-${{ steps.vars.outputs.sha_short }}
          files: build/kexp-v${{ github.event.inputs.version }}-${{ steps.vars.outputs.sha_short }}.bin
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
